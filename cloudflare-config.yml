# mempalace-tunnel — Cloudflare tunnel config template
# Replace YOUR_TUNNEL_ID with your actual tunnel ID (find it via `cloudflared tunnel list`)
# Route: mempalace.yourdomain.com -> localhost:8765 (MemPalace MCP HTTP)

tunnel: YOUR_TUNNEL_ID
credentials-file: /path/to/YOUR_TUNNEL_ID.json

ingress:
  # MemPalace MCP — serves local memory to cloud agents
  - hostname: mempalace.yourdomain.com
    service: http://127.0.0.1:8765

  # Catch-all: return 404 for unconfigured hosts
  - service: http_status:404

# Quick-start:
#   1. Replace YOUR_TUNNEL_ID with your Cloudflare tunnel ID
#   2. Set the credentials-file path
#   3. Run: cloudflared tunnel route dns YOUR_TUNNEL_ID mempalace.yourdomain.com
#   4. Run: cloudflared tunnel run YOUR_TUNNEL_ID
