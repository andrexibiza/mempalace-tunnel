# Auth Token — Secure Your MCP Server
# ====================================
# When you expose MemPalace through a Cloudflare tunnel, the MCP endpoint is
# reachable from the internet. Set a bearer token so only your agents can use it.
#
# This is REQUIRED for tunnel/production, OPTIONAL for localhost-only use.

# ── Step 1: Generate a strong token ──────────────────────────────────────
# Run this once:
#   python3 -c "import secrets; print('mcp-' + secrets.token_hex(16))"
#
# Example output: mcp-8916b95ae6876c8ba69feb9d08f23b63
#
# SAVE THIS TOKEN. Store it in your password manager.
# If you lose it, you'll have to restart the MCP server with a new token
# and update every agent's config. Don't lose it.

# ── Step 2: Start the MCP server with the token ──────────────────────────
# Linux/macOS:
#   export MEMPALACE_MCP_HTTP_TOKEN="your-token-here"
#   export MEMPALACE_WRITER_ROLE="mcp-http-singleton"
#   mempalace mcp serve --host 127.0.0.1 --port 8765
#
# Windows (PowerShell):
#   $env:MEMPALACE_MCP_HTTP_TOKEN = "your-token-here"
#   $env:MEMPALACE_WRITER_ROLE = "mcp-http-singleton"
#   Start-Process pythonw -ArgumentList "-m","mempalace.mcp_server","--palace","$HOME\.mempalace","--transport","http","--host","127.0.0.1","--port","8765"

# ── Step 3: Add the token to your Hermes config ──────────────────────────
# In ~/.hermes/config.yaml, under mcp_servers.mempalace:
#
#   mcp_servers:
#     mempalace:
#       url: http://127.0.0.1:8765/mcp
#       headers:
#         Authorization: "Bearer your-token-here"
#
# For cloud agents using the tunnel:
#   mcp_servers:
#     mempalace:
#       url: https://mempalace.yourdomain.com/mcp
#       headers:
#         Authorization: "Bearer your-token-here"

# ── Verification ─────────────────────────────────────────────────────────
# Without token (should return 401):
#   curl -X POST http://127.0.0.1:8765/mcp -H "Content-Type: application/json" \
#     -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}'
#
# With token (should return 200 + tool list):
#   curl -X POST http://127.0.0.1:8765/mcp -H "Content-Type: application/json" \
#     -H "Authorization: Bearer your-token-here" \
#     -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}'

# ── Important ────────────────────────────────────────────────────────────
# - If you lose this token, there is NO recovery. Generate a new one.
# - The tunnel (cloudflared) encrypts traffic between your machine and
#   Cloudflare's edge, but the MCP endpoint is still publicly reachable.
#   The bearer token prevents unauthorized agents from reading your memory.
# - For localhost-only use (no tunnel), you can skip the token entirely.
#   Just don't set MEMPALACE_MCP_HTTP_TOKEN and the server won't require auth.
